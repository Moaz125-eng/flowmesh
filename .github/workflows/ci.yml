name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: flowmesh
          POSTGRES_PASSWORD: flowmesh
          POSTGRES_DB: flowmesh
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck --workspaces --if-present

      - name: Test
        run: npm test --workspaces --if-present
        env:
          DATABASE_URL: postgres://flowmesh:flowmesh@localhost:5432/flowmesh
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      - name: Build
        run: npm run build --workspaces --if-present
