services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flowmesh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flowmesh}
      POSTGRES_DB: ${POSTGRES_DB:-flowmesh}
    volumes:
      - flowmesh-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flowmesh}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - flowmesh-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-flowmesh}:${POSTGRES_PASSWORD:-flowmesh}@postgres:5432/${POSTGRES_DB:-flowmesh}
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      LOG_LEVEL: info
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-8}
      API_KEYS: ${API_KEYS:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  flowmesh-pg:
  flowmesh-redis:
